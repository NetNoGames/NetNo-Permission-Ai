<!DOCTYPE html>
<html>
<head>
  <title>NetNo AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    .header {
      padding: 15px;
      font-size: 18px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    .chat-box {
      height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px 15px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
    }

    .ai {
      background: #1f2937;
    }

    .input-area {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #111;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #222;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 12px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">✨ NetNo AI</div>

<div id="chat" class="chat-box"></div>

<div class="input-area">
  <input id="msg" placeholder="Ask something...">
  <button onclick="sendMsg()">➤</button>
</div>

<script>
function sendMsg() {
  let msg = document.getElementById("msg").value;
  if(msg.trim() === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${msg}</div>`;

  let reply = "Working on it...";

  setTimeout(() => {
    chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
