
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Developer Texture Toolkit Pro</title>
<style>
body{margin:0;background:#121212;color:#fff;font-family:Arial}
.topbar{height:50px;display:flex;justify-content:flex-end;align-items:center;padding:0 15px;background:#1b1b1b}
.menu{font-size:28px;cursor:pointer}
.sidebar{
position:fixed;left:-250px;top:0;width:250px;height:100%;
background:#202020;transition:.3s;padding-top:60px;z-index:10
}
.sidebar button{display:block;width:90%;margin:10px auto;padding:12px}
.sidebar.open{left:0}
.page{padding:15px;text-align:center}
.docTabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.docTab{padding:8px 12px;background:#333;cursor:pointer}
textarea{
width:100%;height:500px;background:#1e1e1e;color:white;
border:1px solid #444;padding:10px;box-sizing:border-box
}
button,input{margin:5px;padding:10px}
canvas{border:1px solid #444;max-width:320px;margin:10px}
</style>
</head>
<body>

<div class="topbar">
<div class="menu" onclick="toggleSidebar()">☰</div>
</div>

<div id="sidebar" class="sidebar">
<button onclick="showSection('maps')">Maps Generator</button>
<button onclick="showSection('docs')">Create Document</button>
</div>

<div id="mapsSection" class="page">
<h1>Developer Texture Toolkit Pro</h1>
<p>Current Map Generator Section (same functionality can remain here).</p>
</div>

<div id="docsSection" class="page" style="display:none">
<h2>Document Editor</h2>
<button onclick="createDoc()">+ New Document</button>
<div id="tabs" class="docTabs"></div>
<textarea id="editor"></textarea>
</div>

<script>
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

function showSection(section){
document.getElementById("mapsSection").style.display =
section==="maps" ? "block":"none";
document.getElementById("docsSection").style.display =
section==="docs" ? "block":"none";
}

let docs=[];
let active=-1;

function createDoc(){
const name="Document "+(docs.length+1);
docs.push({name:name,text:""});
renderTabs();
openDoc(docs.length-1);
}

function renderTabs(){
const tabs=document.getElementById("tabs");
tabs.innerHTML="";
docs.forEach((d,i)=>{
const el=document.createElement("div");
el.className="docTab";
el.textContent=d.name;
el.onclick=()=>openDoc(i);
tabs.appendChild(el);
});
}

function openDoc(i){
if(active>=0){
docs[active].text=document.getElementById("editor").value;
}
active=i;
document.getElementById("editor").value=docs[i].text;
}

document.getElementById("editor").addEventListener("input",()=>{
if(active>=0) docs[active].text=editor.value;
});
</script>

</body>
</html>
