<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Developer Texture Toolkit Pro</title>
<style>
body{background:#121212;color:#fff;font-family:Arial;text-align:center}
button,input{margin:5px;padding:10px}
canvas{border:1px solid #444;max-width:320px;margin:10px}
.controls{margin:10px}
</style>
</head>
<body>

<h1>Developer Texture Toolkit Pro</h1>

<input type="file" id="upload"><br>

<div class="controls">
<label>Normal Strength</label>
<input type="range" id="normalStrength" min="1" max="10" value="3">
<label>AO Strength</label>
<input type="range" id="aoStrength" min="1" max="10" value="3">
</div>

<button onclick="generateHeight()">Height</button>
<button onclick="generateNormal()">Normal</button>
<button onclick="generateAO()">AO</button>
<button onclick="generateMetallic()">Metallic</button>
<button onclick="generateSmoothness()">Smoothness</button>
<button onclick="generateEmission()">Emission</button>
<button onclick="generateSpecular()">Specular</button>
<button onclick="generateOpacity()">Opacity</button>

<hr>

<button onclick="resizeTex(512)">512</button>
<button onclick="resizeTex(1024)">1024</button>
<button onclick="resizeTex(2048)">2K</button>
<button onclick="resizeTex(4096)">4K</button>

<button onclick="generatePalette()">Palette</button>

<hr>

<canvas id="source"></canvas>
<canvas id="output"></canvas>

<div id="palette"></div>

<hr>

<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadJPG()">Download JPG</button>
<button onclick="generateAllMaps()">Generate All Maps</button>

<script>
const upload=document.getElementById("upload");
const sourceCanvas=document.getElementById("source");
const sourceCtx=sourceCanvas.getContext("2d");
const outputCanvas=document.getElementById("output");
const outputCtx=outputCanvas.getContext("2d");

let imageLoaded=false;

upload.addEventListener("change",e=>{
const file=e.target.files[0];
const img=new Image();

img.onload=()=>{
sourceCanvas.width=img.width;
sourceCanvas.height=img.height;
outputCanvas.width=img.width;
outputCanvas.height=img.height;
sourceCtx.drawImage(img,0,0);
outputCtx.drawImage(img,0,0);
imageLoaded=true;
};

img.src=URL.createObjectURL(file);
});

function getGray(img){
const d=img.data;
for(let i=0;i<d.length;i+=4){
let g=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
d[i]=d[i+1]=d[i+2]=g;
}
return img;
}

function generateHeight(){
if(!imageLoaded)return;
let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
outputCtx.putImageData(getGray(img),0,0);
}

function generateSmoothness(){
if(!imageLoaded)return;
let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
let d=img.data;
for(let i=0;i<d.length;i+=4){
let g=255-(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);
d[i]=d[i+1]=d[i+2]=g;
}
outputCtx.putImageData(img,0,0);
}

function generateAO(){
if(!imageLoaded)return;
let strength=parseInt(document.getElementById("aoStrength").value);
let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
let d=img.data;
for(let i=0;i<d.length;i+=4){
let g=(d[i]+d[i+1]+d[i+2])/3;
g=Math.max(0,g-(strength*12));
d[i]=d[i+1]=d[i+2]=g;
}
outputCtx.putImageData(img,0,0);
}

function generateMetallic(){
if(!imageLoaded)return;
let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
let d=img.data;
for(let i=0;i<d.length;i+=4){
let v=((d[i]+d[i+1]+d[i+2])/3)>128?255:0;
d[i]=d[i+1]=d[i+2]=v;
}
outputCtx.putImageData(img,0,0);
}

function generateEmission(){
if(!imageLoaded)return;
let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
let d=img.data;
for(let i=0;i<d.length;i+=4){
d[i]=Math.min(255,d[i]*1.6);
d[i+1]=Math.min(255,d[i+1]*1.6);
d[i+2]=Math.min(255,d[i+2]*1.6);
}
outputCtx.putImageData(img,0,0);
}

function generateSpecular(){generateEmission();}

function generateOpacity(){
if(!imageLoaded)return;
let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
let d=img.data;
for(let i=0;i<d.length;i+=4){
let a=(d[i]+d[i+1]+d[i+2])/3;
d[i]=255;d[i+1]=255;d[i+2]=255;d[i+3]=a;
}
outputCtx.putImageData(img,0,0);
}

function generateNormal(){
if(!imageLoaded)return;
const strength=parseInt(document.getElementById("normalStrength").value);
const w=sourceCanvas.width,h=sourceCanvas.height;
const src=sourceCtx.getImageData(0,0,w,h);
const dst=outputCtx.createImageData(w,h);
const s=src.data,d=dst.data;

function ht(x,y){
x=Math.max(0,Math.min(w-1,x));
y=Math.max(0,Math.min(h-1,y));
let i=(y*w+x)*4;
return (s[i]+s[i+1]+s[i+2])/765;
}

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){
let dx=(ht(x+1,y)-ht(x-1,y))*strength;
let dy=(ht(x,y+1)-ht(x,y-1))*strength;
let dz=1;
let len=Math.sqrt(dx*dx+dy*dy+dz*dz);
dx/=len;dy/=len;dz/=len;
let i=(y*w+x)*4;
d[i]=(dx*0.5+0.5)*255;
d[i+1]=(dy*0.5+0.5)*255;
d[i+2]=(dz*0.5+0.5)*255;
d[i+3]=255;
}
}
outputCtx.putImageData(dst,0,0);
}

function resizeTex(size){
if(!imageLoaded)return;
const c=document.createElement("canvas");
c.width=size;c.height=size;
c.getContext("2d").drawImage(sourceCanvas,0,0,size,size);
outputCanvas.width=size;
outputCanvas.height=size;
outputCtx.drawImage(c,0,0);
}

function generatePalette(){
if(!imageLoaded)return;
const img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height).data;
let html="";
for(let i=0;i<8;i++){
let p=Math.floor(Math.random()*(img.length/4))*4;
html+=`<div style="display:inline-block;width:50px;height:50px;background:rgb(${img[p]},${img[p+1]},${img[p+2]});margin:3px"></div>`;
}
document.getElementById("palette").innerHTML=html;
}

function downloadPNG(){
const a=document.createElement("a");
a.href=outputCanvas.toDataURL("image/png");
a.download="texture.png";
a.click();
}

function downloadJPG(){
const a=document.createElement("a");
a.href=outputCanvas.toDataURL("image/jpeg",0.95);
a.download="texture.jpg";
a.click();
}

function generateAllMaps(){
alert("Generate Height, Normal, AO, Metallic, Smoothness, Emission using individual buttons. ZIP export can be added later.");
}
</script>
</body>
</html>
