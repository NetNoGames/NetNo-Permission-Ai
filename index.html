<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Developer Texture Toolkit</title>
<style>
body{background:#1a1a1a;color:white;font-family:Arial;text-align:center}
button,input{margin:5px;padding:10px}
canvas{border:1px solid #444;max-width:350px;margin:10px}
#palette div{display:inline-block;width:50px;height:50px;margin:3px}
</style>
</head>
<body>
<h1>Developer Texture Toolkit</h1>

<input type="file" id="upload">
<br>

<button onclick="generateHeight()">Height</button>
<button onclick="generateNormal()">Normal</button>
<button onclick="generateAO()">AO</button>
<button onclick="generateMetallic()">Metallic</button>
<button onclick="generateSmoothness()">Smoothness</button>
<button onclick="generateEmission()">Emission</button>
<button onclick="generateSpecular()">Specular</button>
<button onclick="generateOpacity()">Opacity</button>

<hr>

<button onclick="resizeTex(512)">Resize 512</button>
<button onclick="resizeTex(1024)">Resize 1024</button>
<button onclick="generatePalette()">Palette</button>

<hr>

<canvas id="source"></canvas>
<canvas id="output"></canvas>

<div id="palette"></div>

<br>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadJPG()">Download JPG</button>

<script>
const upload=document.getElementById("upload");
const sourceCanvas=document.getElementById("source");
const sourceCtx=sourceCanvas.getContext("2d");
const outputCanvas=document.getElementById("output");
const outputCtx=outputCanvas.getContext("2d");
let imageLoaded=false;

upload.addEventListener("change",e=>{
 const file=e.target.files[0];
 const img=new Image();
 img.onload=()=>{
  sourceCanvas.width=img.width;
  sourceCanvas.height=img.height;
  outputCanvas.width=img.width;
  outputCanvas.height=img.height;
  sourceCtx.drawImage(img,0,0);
  outputCtx.drawImage(img,0,0);
  imageLoaded=true;
 };
 img.src=URL.createObjectURL(file);
});

function grayMap(invert=false){
 if(!imageLoaded) return;
 let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
 let d=img.data;
 for(let i=0;i<d.length;i+=4){
  let g=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
  if(invert) g=255-g;
  d[i]=d[i+1]=d[i+2]=g;
 }
 outputCtx.putImageData(img,0,0);
}

function generateHeight(){grayMap(false);}
function generateSmoothness(){grayMap(true);}
function generateAO(){grayMap(false);}

function generateMetallic(){
 if(!imageLoaded) return;
 let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
 let d=img.data;
 for(let i=0;i<d.length;i+=4){
  let v=((d[i]+d[i+1]+d[i+2])/3)>128?255:0;
  d[i]=d[i+1]=d[i+2]=v;
 }
 outputCtx.putImageData(img,0,0);
}

function generateEmission(){
 if(!imageLoaded) return;
 let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
 let d=img.data;
 for(let i=0;i<d.length;i+=4){
  d[i]=Math.min(255,d[i]*1.5);
  d[i+1]=Math.min(255,d[i+1]*1.5);
  d[i+2]=Math.min(255,d[i+2]*1.5);
 }
 outputCtx.putImageData(img,0,0);
}

function generateSpecular(){ generateEmission(); }

function generateOpacity(){
 if(!imageLoaded) return;
 let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height);
 let d=img.data;
 for(let i=0;i<d.length;i+=4){
  let a=(d[i]+d[i+1]+d[i+2])/3;
  d[i]=255; d[i+1]=255; d[i+2]=255; d[i+3]=a;
 }
 outputCtx.putImageData(img,0,0);
}

function generateNormal(){
 if(!imageLoaded) return;
 const w=sourceCanvas.width,h=sourceCanvas.height;
 const src=sourceCtx.getImageData(0,0,w,h);
 const dst=outputCtx.createImageData(w,h);
 const s=src.data,d=dst.data;

 function ht(x,y){
  x=Math.max(0,Math.min(w-1,x));
  y=Math.max(0,Math.min(h-1,y));
  let i=(y*w+x)*4;
  return (s[i]+s[i+1]+s[i+2])/765;
 }

 for(let y=0;y<h;y++){
  for(let x=0;x<w;x++){
   let dx=ht(x+1,y)-ht(x-1,y);
   let dy=ht(x,y+1)-ht(x,y-1);
   let dz=1;
   let l=Math.sqrt(dx*dx+dy*dy+dz*dz);
   dx/=l; dy/=l; dz/=l;
   let i=(y*w+x)*4;
   d[i]=(dx*0.5+0.5)*255;
   d[i+1]=(dy*0.5+0.5)*255;
   d[i+2]=(dz*0.5+0.5)*255;
   d[i+3]=255;
  }
 }
 outputCtx.putImageData(dst,0,0);
}

function resizeTex(size){
 if(!imageLoaded) return;
 const temp=document.createElement("canvas");
 temp.width=size; temp.height=size;
 temp.getContext("2d").drawImage(sourceCanvas,0,0,size,size);
 outputCanvas.width=size;
 outputCanvas.height=size;
 outputCtx.drawImage(temp,0,0);
}

function generatePalette(){
 if(!imageLoaded) return;
 let img=sourceCtx.getImageData(0,0,sourceCanvas.width,sourceCanvas.height).data;
 let html="";
 for(let n=0;n<6;n++){
  let p=Math.floor(Math.random()*(img.length/4))*4;
  html+=`<div style="background:rgb(${img[p]},${img[p+1]},${img[p+2]})"></div>`;
 }
 document.getElementById("palette").innerHTML=html;
}

function downloadPNG(){
 let a=document.createElement("a");
 a.href=outputCanvas.toDataURL("image/png");
 a.download="texture.png";
 a.click();
}

function downloadJPG(){
 let a=document.createElement("a");
 a.href=outputCanvas.toDataURL("image/jpeg",0.9);
 a.download="texture.jpg";
 a.click();
}
</script>
</body>
</html>
