<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Unity Texture Map Generator</title>

<style>
body{
    background:#1a1a1a;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin:20px;
}

input{
    margin:10px;
}

button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}

canvas{
    border:1px solid #444;
    margin:10px;
    max-width:300px;
}
</style>
</head>
<body>

<h1>Unity Texture Map Generator</h1>

<input type="file" id="upload">

<br>

<button onclick="generateHeight()">Height Map</button>
<button onclick="generateNormal()">Normal Map</button>
<button onclick="generateRoughness()">Roughness</button>
<button onclick="generateSmoothness()">Smoothness</button>

<br>

<canvas id="source"></canvas>
<canvas id="output"></canvas>

<br>

<button onclick="downloadMap()">Download PNG</button>

<script>

const upload = document.getElementById("upload");

const sourceCanvas = document.getElementById("source");
const sourceCtx = sourceCanvas.getContext("2d");

const outputCanvas = document.getElementById("output");
const outputCtx = outputCanvas.getContext("2d");

let imageLoaded = false;

upload.addEventListener("change", e=>{

    const file = e.target.files[0];
    const img = new Image();

    img.onload = ()=>{

        sourceCanvas.width = img.width;
        sourceCanvas.height = img.height;

        outputCanvas.width = img.width;
        outputCanvas.height = img.height;

        sourceCtx.drawImage(img,0,0);

        imageLoaded = true;
    }

    img.src = URL.createObjectURL(file);
});

function generateHeight(){

    if(!imageLoaded) return;

    const imgData = sourceCtx.getImageData(
        0,0,
        sourceCanvas.width,
        sourceCanvas.height
    );

    const data = imgData.data;

    for(let i=0;i<data.length;i+=4){

        const gray =
        data[i]*0.299 +
        data[i+1]*0.587 +
        data[i+2]*0.114;

        data[i]=gray;
        data[i+1]=gray;
        data[i+2]=gray;
    }

    outputCtx.putImageData(imgData,0,0);
}

function generateRoughness(){

    if(!imageLoaded) return;

    const imgData = sourceCtx.getImageData(
        0,0,
        sourceCanvas.width,
        sourceCanvas.height
    );

    const data = imgData.data;

    for(let i=0;i<data.length;i+=4){

        const gray =
        data[i]*0.299 +
        data[i+1]*0.587 +
        data[i+2]*0.114;

        data[i]=gray;
        data[i+1]=gray;
        data[i+2]=gray;
    }

    outputCtx.putImageData(imgData,0,0);
}

function generateSmoothness(){

    if(!imageLoaded) return;

    const imgData = sourceCtx.getImageData(
        0,0,
        sourceCanvas.width,
        sourceCanvas.height
    );

    const data = imgData.data;

    for(let i=0;i<data.length;i+=4){

        const gray =
        255 - (
        data[i]*0.299 +
        data[i+1]*0.587 +
        data[i+2]*0.114
        );

        data[i]=gray;
        data[i+1]=gray;
        data[i+2]=gray;
    }

    outputCtx.putImageData(imgData,0,0);
}

function generateNormal(){

    if(!imageLoaded) return;

    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const src = sourceCtx.getImageData(0,0,w,h);
    const dst = outputCtx.createImageData(w,h);

    const s = src.data;
    const d = dst.data;

    function height(x,y){

        x=Math.max(0,Math.min(w-1,x));
        y=Math.max(0,Math.min(h-1,y));

        const i=(y*w+x)*4;

        return (
            s[i]*0.299 +
            s[i+1]*0.587 +
            s[i+2]*0.114
        )/255;
    }

    for(let y=0;y<h;y++){

        for(let x=0;x<w;x++){

            const hl = height(x-1,y);
            const hr = height(x+1,y);

            const hu = height(x,y-1);
            const hd = height(x,y+1);

            let dx = hr - hl;
            let dy = hd - hu;

            let dz = 1.0;

            let len =
            Math.sqrt(dx*dx+dy*dy+dz*dz);

            dx/=len;
            dy/=len;
            dz/=len;

            const i=(y*w+x)*4;

            d[i]=(dx*0.5+0.5)*255;
            d[i+1]=(dy*0.5+0.5)*255;
            d[i+2]=(dz*0.5+0.5)*255;
            d[i+3]=255;
        }
    }

    outputCtx.putImageData(dst,0,0);
}

function downloadMap(){

    const a=document.createElement("a");

    a.href=outputCanvas.toDataURL("image/png");
    a.download="map.png";

    a.click();
}

</script>

</body>
</html>
